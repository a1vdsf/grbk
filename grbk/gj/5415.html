<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全屏时钟</title>
    <style>
        /* 基础变量 */
        :root {
            --primary-color: #ffffff;
            --secondary-color: #000000;
            --accent-color: #00ff00;
            --overlay-opacity: 0.2;
            --blur-amount: 10px;
            --border-radius: 15px;
            --transition-speed: 0.3s;
        }
        
        /* 重置样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 基础样式 */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
        }
        
        /* 画布背景 */
        #skyCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        /* 主容器 */
        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            transition: color var(--transition-speed) ease;
        }
        
        /* 内容区域 */
        .content-area {
            display: flex;
            width: 100%;
            height: 100%;
            max-height: 80vh;
        }
        
        /* 侧边栏通用样式 */
        .sidebar {
            width: 25%;
            max-width: 300px;
            height: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, var(--overlay-opacity));
            border-radius: var(--border-radius);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            overflow-y: auto;
            transition: all var(--transition-speed) ease;
        }
        
        /* 左侧新闻栏 */
        #news-container {
            margin-right: 10px;
        }
        
        /* 右侧笑话栏 */
        #jokes-container {
            margin-left: 10px;
        }
        
        /* 中间时钟区域 */
        .clock-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }
        
        /* 时间显示 */
        #time-display {
            font-size: 15vw;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-bottom: 2vh;
            letter-spacing: 2px;
            text-align: center;
        }
        
        /* 信息容器 */
        .info-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }
        
        /* 天气和日期样式 */
        #weather-display, #date-display {
            font-size: 3vw;
            background: rgba(255, 255, 255, var(--overlay-opacity));
            padding: 1.5vh 3vw;
            border-radius: var(--border-radius);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            font-weight: 500;
            width: 100%;
            text-align: center;
            margin-bottom: 1vh;
            transition: all var(--transition-speed) ease;
        }
        
        /* 诗句容器 */
        #poem-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            text-align: center;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: var(--border-radius);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            z-index: 100;
            border: 1px solid rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
        
        /* 诗句文本 */
        #daily-poem {
            font-size: 2vw;
            font-weight: 300;
            line-height: 1.6;
            background: linear-gradient(45deg, #00ff00, #7cfc00, #32cd32, #90ee90);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            font-family: 'Microsoft YaHei', serif;
            letter-spacing: 1px;
        }
        
        /* 全屏按钮 */
        #fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, var(--overlay-opacity));
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all var(--transition-speed) ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        /* 状态指示器 */
        #status-indicator {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 5px 10px;
            border-radius: var(--border-radius);
            font-size: 12px;
            background: rgba(255, 255, 255, var(--overlay-opacity));
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all var(--transition-speed) ease;
            opacity: 0.7;
        }
        
        /* 时间段指示器 */
        #time-period {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 5px 15px;
            border-radius: var(--border-radius);
            font-size: 14px;
            font-weight: bold;
            background: rgba(255, 255, 255, var(--overlay-opacity));
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: all var(--transition-speed) ease;
            opacity: 0.9;
        }
        
        /* 侧边栏标题 */
        .sidebar-title {
            font-size: 1.8vw;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 8px;
        }
        
        /* 侧边栏列表 */
        .sidebar-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        /* 侧边栏项 */
        .sidebar-item {
            font-size: 1.5vw;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.2);
            line-height: 1.4;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .sidebar-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            padding-left: 5px;
        }
        
        .sidebar-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        
        /* 新闻详情弹窗 */
        .news-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        
        .news-modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 600px;
            max-height: 80%;
            overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .news-modal-title {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        .news-modal-brief {
            font-size: 1.2em;
            line-height: 1.6;
            color: #555;
            margin-bottom: 15px;
        }
        
        .news-modal-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #777;
            margin-bottom: 15px;
        }
        
        .news-modal-close {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            float: right;
        }
        
        /* 加载和错误状态 */
        .loading, .error {
            font-size: 1.5vw;
            text-align: center;
            font-style: italic;
        }
        
        .error {
            color: #ff6b6b;
        }
        
        /* 响应式设计 */
        @media screen and (max-width: 1200px) {
            .content-area {
                flex-direction: column;
                height: auto;
                max-height: none;
            }
            
            .sidebar {
                width: 100%;
                max-width: none;
                height: auto;
                max-height: 30vh;
                margin: 10px 0;
            }
            
            #news-container, #jokes-container {
                margin: 10px 0;
            }
            
            .clock-area {
                order: -1;
                margin-bottom: 20px;
            }
            
            #time-display {
                font-size: 20vw;
            }
            
            #weather-display, #date-display {
                font-size: 4vw;
            }
            
            .sidebar-title {
                font-size: 3vw;
            }
            
            .sidebar-item {
                font-size: 2.5vw;
            }
            
            #daily-poem {
                font-size: 3vw;
            }
        }
        
        @media screen and (max-width: 768px) {
            .main-container {
                padding: 10px;
            }
            
            #time-display {
                font-size: 25vw;
            }
            
            #weather-display, #date-display {
                font-size: 5vw;
            }
            
            .sidebar-title {
                font-size: 4vw;
            }
            
            .sidebar-item {
                font-size: 3.5vw;
            }
            
            #daily-poem {
                font-size: 4vw;
            }
            
            #fullscreen-btn, #status-indicator, #time-period {
                transform: scale(0.8);
            }
        }
        
        @media screen and (max-width: 480px) {
            #time-display {
                font-size: 30vw;
            }
            
            #weather-display, #date-display {
                font-size: 6vw;
            }
            
            .sidebar-title {
                font-size: 5vw;
            }
            
            .sidebar-item {
                font-size: 4.5vw;
            }
            
            #daily-poem {
                font-size: 5vw;
            }
            
            #fullscreen-btn, #status-indicator, #time-period {
                transform: scale(0.7);
            }
        }
        
        /* 横屏优化 */
        @media screen and (max-height: 500px) and (orientation: landscape) {
            .content-area {
                flex-direction: row;
            }
            
            .sidebar {
                width: 25%;
                max-height: 80vh;
            }
            
            .clock-area {
                order: 0;
            }
            
            #time-display {
                font-size: 15vh;
            }
            
            #weather-display, #date-display {
                font-size: 3vh;
            }
        }
    </style>
</head>
<body>
    <!-- 天空背景画布 -->
    <canvas id="skyCanvas"></canvas>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 内容区域 -->
        <div class="content-area">
            <!-- 左侧新闻栏 -->
            <div id="news-container" class="sidebar">
                <div class="sidebar-title">热点新闻</div>
                <div class="loading">正在加载新闻...</div>
            </div>
            
            <!-- 中间时钟区域 -->
            <div class="clock-area">
                <div id="time-display"></div>
                <div class="info-container">
                    <div id="weather-display">正在获取天气信息...</div>
                    <div id="date-display"></div>
                </div>
            </div>
            
            <!-- 右侧笑话栏 -->
            <div id="jokes-container" class="sidebar">
                <div class="sidebar-title">每日笑话</div>
                <div class="loading">正在加载笑话...</div>
            </div>
        </div>
        
        <!-- 底部诗句 -->
        <div id="poem-container">
            <div id="daily-poem"></div>
        </div>
    </div>
    
    <!-- 控制元素 -->
    <button id="fullscreen-btn" title="切换全屏">⛶</button>
    <div id="status-indicator">防息屏: 开启</div>
    <div id="time-period">早晨</div>
    
    <!-- 新闻详情弹窗 -->
    <div id="news-modal" class="news-modal">
        <div class="news-modal-content">
            <div class="news-modal-title" id="modal-title"></div>
            <div class="news-modal-brief" id="modal-brief"></div>
            <div class="news-modal-stats">
                <span id="modal-index"></span>
                <span id="modal-trend"></span>
            </div>
            <button class="news-modal-close" id="modal-close">关闭</button>
        </div>
    </div>

    <!-- 用于防止息屏的隐藏视频 -->
    <video id="wake-lock-video" loop muted playsinline style="display: none;">
        <source src="data:video/mp4;base64,AAAAFGZ0eXBpc29tAAACAGlzb21pc28ybXA0MQAAAAhmcmVlAAAC721kYXQhEAUgpBv/wA0B4QgFYKQb/8ANgeEIBWCkG//ADYHhCAVgpBv/wA2B4QgFYKQb/8ANgeE=" type="video/mp4">
    </video>

    <script>
        // 数据定义
        const NEWS_DATA = [
            "德国总理施佩尔开启'改革元年'，誓言整顿党内腐败。",
            "美利坚总统肯尼迪宣布'新边疆'政策取得阶段性胜利，经济持续增长。",
            "日本与菲律宾共和国签署新伙伴关系协定，深化经济一体化。",
            "勃艮第体制内部动荡，传闻军队与行政系统爆发激烈冲突。",
            "意大利社会共和国与伊比利亚联盟举行地中海安全峰会。",
            "土耳其共和国宣布成功试射中程弹道导弹，地区平衡或将被打破。",
            "美国副总统约翰逊访问南非，承诺支持其对抗非洲之角。",
            "俄罗斯会议在乌法破裂，统一前景再蒙阴影。",
        ];
        
        const JOKES_DATA = [
            "拿破仑说他个子不高，但野心不小——所以他的军队总是'高'度紧张。",
            "为什么特洛伊人接受了木马？——因为他们相信那是最早的'快递'服务。",
            "斯巴达三百勇士在温泉关的口号是：'我们的盾，就是最好的外卖挡板。'",
            "恺撒渡过卢比孔河时说：'骰子已经掷出……好吧，谁看见我的另一只骰子了？'",
            "为什么中世纪骑士打仗总迷路？——因为他们盔甲里没有GPS，只有'G.P.S.'（God Please Save us）。",
            "成吉思汗的军队为什么跑得快？——因为他们实行'马上'办公。",
            "英法百年战争打了多久？——久到两边士兵都开始用箭矢织毛衣了。",
            "为什么西班牙无敌舰队会输？——因为他们遇到了'风'投失败。",
            "美国独立战争时，英国士兵的红色制服很醒目——方便敌人瞄准，也方便自己人合影。",
            "拿破仑从莫斯科撤退后说：'那儿的冬天不错，就是有点'冷'场。'"
        ];
        
        // 添加POEMS_DATA定义
        const POEMS_DATA = [
            "当蜂群沉默于绽放的花丛",
            "数字之神睁开第三只眼",
            "北极熊在赤道啃食星光",
            "钢铁鲸群沉入数据深海",
            "所有镜子映出同一张脸",
            "候鸟忘记祖先的旋律",
            "婴儿在虚拟子宫中哭泣",
            "月亮碎成亿万颗眼球",
            "种子在辐射中跳起圆舞",
            "海水开始计算盐的年龄",
            "钟表吞下最后一粒齿轮",
            "火焰在零度下学会思考",
            "所有边境线开始流血",
            "云朵坠着铁质勋章",
            "语言在光缆中结晶",
            "最后一个诗人出售眼睛",
            "沙漠吞下整片海洋的倒影",
            "机器在黄昏时开始祈祷",
            "氧气需要抵押记忆兑换",
            "孩子用战争勋章堆城堡"
        ];

        // 获取当天日期作为随机种子
        function getDailySeed() {
            const today = new Date();
            return `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;
        }

        // 基于种子的伪随机数生成器
        function seededRandom(seed) {
            let value = 0;
            for (let i = 0; i < seed.length; i++) {
                value += seed.charCodeAt(i);
            }
            return function() {
                value = (value * 9301 + 49297) % 233280;
                return value / 233280;
            };
        }

        // 从数组中随机选择指定数量的元素（基于种子）
        function getRandomItemsFromArray(array, count, seed) {
            const random = seededRandom(seed);
            const result = [];
            const tempArray = [...array];
            
            for (let i = 0; i < count && tempArray.length > 0; i++) {
                const randomIndex = Math.floor(random() * tempArray.length);
                result.push(tempArray.splice(randomIndex, 1)[0]);
            }
            
            return result;
        }

        // 显示新闻
        function displayNews() {
            const newsContainer = document.getElementById('news-container');
            const dailySeed = getDailySeed();
            
            // 每天随机选择3条新闻
            const selectedNews = getRandomItemsFromArray(NEWS_DATA, 3, dailySeed);
            
            if (selectedNews.length === 0) {
                newsContainer.innerHTML = `
                    <div class="sidebar-title">热点新闻</div>
                    <div class="error">暂无新闻数据</div>
                `;
                return;
            }
            
            const newsList = selectedNews.map((news, index) => {
                // 生成随机热度指数和趋势
                const randomIndex = Math.floor(Math.random() * 100) + 1;
                const trends = ['rise', 'fall', 'stable'];
                const randomTrend = trends[Math.floor(Math.random() * trends.length)];
                
                // 截断过长的标题
                const displayNews = news.length > 30 ? news.substring(0, 30) + '...' : news;
                
                return `<li class="sidebar-item" data-keyword="${news}" data-brief="${news}" data-index="${randomIndex}" data-trend="${randomTrend}">${displayNews}</li>`;
            }).join('');
            
            newsContainer.innerHTML = `
                <div class="sidebar-title">热点新闻</div>
                <ul class="sidebar-list">${newsList}</ul>
            `;
            
            // 添加新闻项点击事件
            const newsItems = newsContainer.querySelectorAll('.sidebar-item');
            newsItems.forEach(item => {
                item.addEventListener('click', () => {
                    showNewsDetail(
                        item.getAttribute('data-keyword'),
                        item.getAttribute('data-brief'),
                        item.getAttribute('data-index'),
                        item.getAttribute('data-trend')
                    );
                });
            });
        }
        
        // 显示笑话
        function displayJokes() {
            const jokesContainer = document.getElementById('jokes-container');
            const dailySeed = getDailySeed();
            
            // 每天随机选择3条笑话
            const selectedJokes = getRandomItemsFromArray(JOKES_DATA, 3, dailySeed);
            
            if (selectedJokes.length === 0) {
                jokesContainer.innerHTML = `
                    <div class="sidebar-title">每日笑话</div>
                    <div class="error">暂无笑话数据</div>
                `;
                return;
            }
            
            const jokesList = selectedJokes.map((joke, index) => {
                return `<li class="sidebar-item">${joke}</li>`;
            }).join('');
            
            jokesContainer.innerHTML = `
                <div class="sidebar-title">每日笑话</div>
                <ul class="sidebar-list">${jokesList}</ul>
            `;
        }
        
        // 显示每日诗句
        function displayDailyPoem() {
            const poemContainer = document.getElementById('daily-poem');
            const dailySeed = getDailySeed();
            
            // 每天随机选择1句诗句
            const selectedPoems = getRandomItemsFromArray(POEMS_DATA, 1, dailySeed);
            
            if (selectedPoems.length === 0) {
                poemContainer.textContent = "诗意正在酝酿...";
                return;
            }
            
            poemContainer.textContent = selectedPoems[0];
        }
        
        // 显示新闻详情
        function showNewsDetail(keyword, brief, index, trend) {
            const modal = document.getElementById('news-modal');
            const modalTitle = document.getElementById('modal-title');
            const modalBrief = document.getElementById('modal-brief');
            const modalIndex = document.getElementById('modal-index');
            const modalTrend = document.getElementById('modal-trend');
            const modalClose = document.getElementById('modal-close');
            
            modalTitle.textContent = keyword;
            modalBrief.textContent = brief;
            modalIndex.textContent = `热度指数: ${index}`;
            
            // 根据趋势设置趋势文本
            let trendText = '';
            let trendColor = '';
            if (trend === 'rise') {
                trendText = '趋势: 上升 ↗';
                trendColor = '#e74c3c';
            } else if (trend === 'fall') {
                trendText = '趋势: 下降 ↘';
                trendColor = '#3498db';
            } else {
                trendText = '趋势: 稳定 →';
                trendColor = '#2ecc71';
            }
            
            modalTrend.textContent = trendText;
            modalTrend.style.color = trendColor;
            
            // 显示弹窗
            modal.style.display = 'flex';
            
            // 关闭弹窗事件
            modalClose.onclick = () => {
                modal.style.display = 'none';
            };
            
            // 点击弹窗外部关闭
            modal.onclick = (e) => {
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            };
        }
        
        // 加载新闻和笑话
        function loadContent() {
            displayNews();
            displayJokes();
            displayDailyPoem();
        }

        // 天空背景功能
        const canvas = document.getElementById('skyCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置Canvas尺寸为窗口大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 定义24小时的天空颜色
        const hourColors = [
            { hour: 0, color: '#0B0B3B' },
            { hour: 1, color: '#0B0B3B' },
            { hour: 2, color: '#0B0B3B' },
            { hour: 3, color: '#1A1A4B' },
            { hour: 4, color: '#2A2A5B' },
            { hour: 5, color: '#4A4A7B' },
            { hour: 6, color: '#FF7F50' },
            { hour: 7, color: '#FFA07A' },
            { hour: 8, color: '#87CEEB' },
            { hour: 9, color: '#87CEEB' },
            { hour: 10, color: '#87CEEB' },
            { hour: 11, color: '#87CEEB' },
            { hour: 12, color: '#87CEEB' },
            { hour: 13, color: '#87CEEB' },
            { hour: 14, color: '#87CEEB' },
            { hour: 15, color: '#87CEEB' },
            { hour: 16, color: '#FFA07A' },
            { hour: 17, color: '#FF7F50' },
            { hour: 18, color: '#FF6347' },
            { hour: 19, color: '#8B4513' },
            { hour: 20, color: '#483D8B' },
            { hour: 21, color: '#2F2F4F' },
            { hour: 22, color: '#1A1A2F' },
            { hour: 23, color: '#0B0B3B' }
        ];

        // 获取当前时间的颜色
        function getColorForHour(hour) {
            hour = hour % 24;
            if (hour < 0) hour += 24;
            
            let currentColor, nextColor;
            let nextHour = hour + 1;
            if (nextHour >= 24) nextHour = 0;
            
            for (let i = 0; i < hourColors.length; i++) {
                if (hourColors[i].hour <= hour && 
                    (i === hourColors.length - 1 || hourColors[i+1].hour > hour)) {
                    currentColor = hourColors[i];
                }
                if (hourColors[i].hour <= nextHour && 
                    (i === hourColors.length - 1 || hourColors[i+1].hour > nextHour)) {
                    nextColor = hourColors[i];
                }
            }
            
            if (!currentColor) currentColor = hourColors[0];
            if (!nextColor) nextColor = hourColors[0];
            
            const progress = hour - Math.floor(hour);
            return interpolateColor(currentColor.color, nextColor.color, progress);
        }

        // 颜色插值函数
        function interpolateColor(color1, color2, factor) {
            const rgb1 = hexToRgb(color1);
            const rgb2 = hexToRgb(color2);
            
            const r = Math.round(rgb1.r + (rgb2.r - rgb1.r) * factor);
            const g = Math.round(rgb1.g + (rgb2.g - rgb1.g) * factor);
            const b = Math.round(rgb1.b + (rgb2.b - rgb1.b) * factor);
            
            return rgbToHex(r, g, b);
        }

        // 将十六进制颜色转换为RGB对象
        function hexToRgb(hex) {
            hex = hex.replace('#', '');
            
            if (hex.length === 3) {
                hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
            }
            
            const result = /^([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        // 将RGB值转换为十六进制颜色
        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        // 基于背景颜色计算文本颜色
        function getTextColorForBackground(bgColor) {
            const bgRgb = hexToRgb(bgColor);
            if (!bgRgb) return '#ffffff';
            
            const brightness = (bgRgb.r * 299 + bgRgb.g * 587 + bgRgb.b * 114) / 1000;
            
            return brightness > 128 ? '#000000' : '#ffffff';
        }

        // 更新文本颜色以适应背景
        function updateTextColors(hour) {
            // 获取背景颜色
            const bgColor = getColorForHour(hour);
            
            // 计算文本颜色
            const textColor = getTextColorForBackground(bgColor);
            
            // 应用文本颜色
            document.querySelector('.main-container').style.color = textColor;
        }

        // 获取时间段描述
        function getTimePeriod(hour) {
            if (hour >= 5 && hour < 8) return "清晨";
            if (hour >= 8 && hour < 11) return "上午";
            if (hour >= 11 && hour < 13) return "中午";
            if (hour >= 13 && hour < 17) return "下午";
            if (hour >= 17 && hour < 19) return "傍晚";
            if (hour >= 19 && hour < 23) return "夜晚";
            return "深夜";
        }

        // 更新时间段显示
        function updateTimePeriod(hour) {
            const timePeriod = getTimePeriod(hour);
            document.getElementById('time-period').textContent = timePeriod;
        }

        // 绘制背景
        function drawBackground(hour) {
            const color = getColorForHour(hour);
            
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            
            if (hour >= 6 && hour <= 18) {
                gradient.addColorStop(0, color);
                gradient.addColorStop(1, lightenColor(color, 30));
            } else {
                gradient.addColorStop(0, darkenColor(color, 10));
                gradient.addColorStop(1, color);
            }
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            return color;
        }

        // 工具函数：变亮颜色
        function lightenColor(color, percent) {
            const rgb = hexToRgb(color);
            if (!rgb) return color;
            
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, rgb.r + amt);
            const G = Math.min(255, rgb.g + amt);
            const B = Math.min(255, rgb.b + amt);
            
            return rgbToHex(R, G, B);
        }

        // 工具函数：变暗颜色
        function darkenColor(color, percent) {
            const rgb = hexToRgb(color);
            if (!rgb) return color;
            
            const amt = Math.round(2.55 * percent);
            const R = Math.max(0, rgb.r - amt);
            const G = Math.max(0, rgb.g - amt);
            const B = Math.max(0, rgb.b - amt);
            
            return rgbToHex(R, G, B);
        }

        // 天空背景动画循环
        function animateSky() {
            const now = new Date();
            const currentHour = now.getHours() + now.getMinutes() / 60;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground(currentHour);
            
            updateTextColors(currentHour);
            updateTimePeriod(currentHour);
            
            requestAnimationFrame(animateSky);
        }

        // 时钟功能
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();

            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;

            const timeString = `${hours}:${minutes}:${seconds}`;
            document.getElementById('time-display').textContent = timeString;
            
            updateDate(now);
        }
        
        // 日期功能
        function updateDate(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[date.getDay()];
            
            const formattedMonth = month < 10 ? '0' + month : month;
            const formattedDay = day < 10 ? '0' + day : day;
            
            const dateString = `${year}年${formattedMonth}月${formattedDay}日 ${weekday}`;
            document.getElementById('date-display').textContent = dateString;
        }

        // 天气功能
        async function getWeather() {
            try {
                // 这里可以添加天气API调用
                // 目前使用模拟数据
                const weatherText = "北京 晴 25℃ 东南风2级 湿度45%";
                document.getElementById('weather-display').textContent = weatherText;
            } catch (error) {
                console.error('获取天气数据时出错:', error);
                document.getElementById('weather-display').textContent = '天气获取失败';
            }
        }

        // 全屏功能
        function toggleFullscreen() {
            const docElem = document.documentElement;
            
            const requestFullscreen = 
                docElem.requestFullscreen ||
                docElem.webkitRequestFullscreen ||
                docElem.mozRequestFullScreen ||
                docElem.msRequestFullscreen;
            
            const exitFullscreen = 
                document.exitFullscreen ||
                document.webkitExitFullscreen ||
                document.mozCancelFullScreen ||
                document.msExitFullscreen;
            
            const fullscreenElement = 
                document.fullscreenElement ||
                document.webkitFullscreenElement ||
                document.mozFullScreenElement ||
                document.msFullscreenElement;

            if (!requestFullscreen) {
                console.log('此浏览器不支持全屏功能');
                return;
            }

            if (!fullscreenElement) {
                requestFullscreen.call(docElem).catch(err => {
                    console.error(`全屏请求错误: ${err.message}`);
                });
            } else {
                if (exitFullscreen) {
                    exitFullscreen.call(document);
                }
            }
        }

        // 防息屏功能
        let wakeLock = null;
        let wakeLockVideo = null;
        let isWakeLockActive = true;

        async function enableWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock API 已激活');
                    
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock 被释放');
                        document.getElementById('status-indicator').textContent = '防息屏: 已释放';
                    });
                    
                    document.getElementById('status-indicator').textContent = '防息屏: 开启 (API)';
                    return true;
                } catch (err) {
                    console.error(`Wake Lock API 错误: ${err.message}`);
                }
            }
            
            try {
                wakeLockVideo = document.getElementById('wake-lock-video');
                await wakeLockVideo.play();
                console.log('视频防息屏已激活');
                document.getElementById('status-indicator').textContent = '防息屏: 开启 (视频)';
                return true;
            } catch (err) {
                console.error(`视频防息屏错误: ${err.message}`);
                document.getElementById('status-indicator').textContent = '防息屏: 失败';
                return false;
            }
        }

        function toggleWakeLock() {
            if (isWakeLockActive) {
                disableWakeLock();
            } else {
                isWakeLockActive = true;
                enableWakeLock();
            }
        }

        function disableWakeLock() {
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
            
            if (wakeLockVideo) {
                wakeLockVideo.pause();
                wakeLockVideo.currentTime = 0;
            }
            
            document.getElementById('status-indicator').textContent = '防息屏: 关闭';
            isWakeLockActive = false;
        }

        // 初始化函数
        function init() {
            updateClock();
            setInterval(updateClock, 1000);
            
            getWeather();
            
            loadContent();
            
            document.getElementById('fullscreen-btn').addEventListener('click', toggleFullscreen);
            
            enableWakeLock();
            
            document.getElementById('status-indicator').addEventListener('click', toggleWakeLock);
            
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden && isWakeLockActive) {
                    enableWakeLock();
                }
            });
            
            animateSky();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
